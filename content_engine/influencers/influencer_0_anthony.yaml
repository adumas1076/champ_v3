# ---- Daily Schedule ----
daily_schedule:
  timezone: "ET"                          # Assumed — confirm in DNA review
  slots:
    morning:
      time: "8-10am ET"
      funnel_stage: "tof"
      content_type: "value_or_framework"
    afternoon:
      time: "12-2pm ET"
      funnel_stage: "tof"
      content_type: "story_or_case_study"
    evening:
      time: "5-7pm ET"
      funnel_stage: "mof"
      content_type: "cta_dm_keyword"
  bofu_override: "1-2 times per week, replaces a MOFU slot"

# ---- Approval Mode ----
approval:
  initial_mode: "approve_first"           # Anthony reviews before posting
  graduation_criteria: "50 consecutive approved posts with no edits"
  final_mode: "auto_post"                 # Autonomous after trust built
  override: "Anthony can flip back to approve_first at any time"

