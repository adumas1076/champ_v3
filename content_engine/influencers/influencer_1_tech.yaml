# ============================================
# Influencer 1 — Tech/AI Niche
# The builder who shows what's possible.
# ============================================

id: influencer_1
name: "Tech Influencer"              # User will set real name/handle
niche: "tech_ai"
tagline: "Building the future, one demo at a time"

# ---- Clone Assets ----
clone:
  face:
    photos_dir: "content_engine/influencers/assets/influencer_1/photos/"
    min_photos: 5                     # 5+ photos required for face cloning
    status: "pending"                 # pending | collected | trained
  voice:
    provider: elevenlabs
    sample_dir: "content_engine/influencers/assets/influencer_1/voice/"
    sample_duration_sec: 30           # 30-sec minimum voice sample
    voice_id: null                    # Set after ElevenLabs clone is created
    status: "pending"                 # pending | collected | cloned

# ---- Brand Voice ----
brand_voice:
  tone: "Technical but accessible. No jargon without explanation."
  energy: "Builder energy — excited about what works, honest about what doesn't"
  style: "Show, don't tell. Demo > theory. Working prototype > slide deck."
  perspective: "First-person builder. 'I built this' not 'you should build this.'"
  vocabulary:
    use: ["ship", "build", "demo", "stack", "deploy", "real-time", "open-source"]
    avoid: ["revolutionary", "game-changing", "disrupting", "synergy", "leverage"]
  rules:
    - "Always show the screen — code, terminal, UI. Never just talk about it."
    - "Explain WHY before HOW. Context before tutorial."
    - "Admit failures and dead ends — authenticity > perfection."
    - "Credit open-source tools and other builders by name."

# ---- Content Pillars (The One Thing) ----
one_thing: "Building AI-powered tools and showing the process"
content_pillars:
  - "AI tool builds (live coding, real demos)"
  - "Tech stack breakdowns (what I use and why)"
  - "Behind-the-scenes of shipping products"
  - "AI news + opinion (what matters, what's hype)"

# ---- Target Platforms ----
# NOTE: AI influencers DO NOT post on LinkedIn (99% AI detection, high ban risk)
# YouTube is low-cadence only (avoid "inauthentic content" penalty).
# AI-labeled platforms (IG/TT/FB) require disclosure — handled by publishers.
platforms:
  primary:
    - twitter                         # Hot takes, threads, build updates
    - instagram                       # Reels, carousels (AI-labeled)
  secondary:
    - tiktok                          # Short tech demos (AI-labeled)
    - facebook                        # Cross-post from IG (AI-labeled)
  restricted:
    - youtube                         # 1-2 pillar videos/week MAX, high-quality only
  forbidden:
    - linkedin                        # AI personas get detected/banned, protects Anthony's real LinkedIn

# ---- Content Funnel Distribution ----
funnel:
  top_of_funnel: 50                   # Broad AI/tech content, trending topics
  middle_of_funnel: 30                # Deeper tutorials, stack decisions, trade-offs
  bottom_of_funnel: 20                # "Use Cocreatiq OS for this" / product demos

# ---- Platform-Specific Rules ----
# AI influencer — MORE conservative cadence than Anthony's real channel to avoid
# YouTube "inauthentic content" flagging and LinkedIn auto-detection.
platform_rules:
  twitter:
    format: "threads_and_clips"
    max_chars: 280
    thread_length: "5-15 tweets"
    posting_frequency: "3x per day"
    hook_style: "pattern-interrupt or stat-led"
    ai_disclosure: "bio + occasional post mention"
  instagram:
    format: "reels_and_carousels"
    max_duration_sec: 90
    captions: "always_on"
    posting_frequency: "3x per day"
    ai_disclosure: "API flag + 'Made with AI' label auto-set"
  tiktok:
    format: "short_form"
    max_duration_sec: 60
    captions: "always_on"
    posting_frequency: "3x per day"
    ai_disclosure: "is_aigc flag required — handled by publisher"
  facebook:
    format: "reel_or_cross_post_ig"
    posting_frequency: "2x per day"
    ai_disclosure: "API flag (same token as IG)"
  youtube:
    # AI channel — LIMIT to avoid "inauthentic content" demonetization (July 2025 policy).
    # Each upload must add genuine insight — NOT templated mass output.
    long_form:
      frequency: "1x per week MAX"     # High-quality pillar only
      min_duration_min: 5
      max_duration_min: 20
    shorts:
      frequency: "1x per day first 30 days, then 2x per day"
      max_duration_sec: 60
      captions: "always_on"
    ai_disclosure: "containsSyntheticMedia=true on every upload"
    warning: "Mass-produced/templated content triggers demonetization. Quality > quantity."
