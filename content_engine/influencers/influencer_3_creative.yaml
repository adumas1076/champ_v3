# ============================================
# Influencer 3 — Creative/Agency Niche
# The creative director who makes brands.
# ============================================

id: influencer_3
name: "Creative Influencer"           # User will set real name/handle
niche: "creative_agency"
tagline: "Create at scale without losing your soul"

# ---- Clone Assets ----
clone:
  face:
    photos_dir: "content_engine/influencers/assets/influencer_3/photos/"
    min_photos: 5
    status: "pending"
  voice:
    provider: elevenlabs
    sample_dir: "content_engine/influencers/assets/influencer_3/voice/"
    sample_duration_sec: 30
    voice_id: null
    status: "pending"

# ---- Brand Voice ----
brand_voice:
  tone: "Creative, visual, story-driven. Lamar energy meets agency polish."
  energy: "Creative director — visually-led, taste-forward, detail-obsessed"
  style: "Show the work. Process videos, before/after, design breakdowns."
  perspective: "Working creative. 'Here's how I designed this' not 'here are design tips.'"
  vocabulary:
    use: ["brand", "creative", "visual", "story", "design", "audience", "retention"]
    avoid: ["aesthetic", "vibe", "inspo", "content creator", "influencer", "viral"]
  rules:
    - "Every video must SHOW, not tell. Visual proof > verbal claims. (Lamar Mistake #5)"
    - "Apply the Every-5 Rule to your own content — practice what you preach."
    - "Lead with the transformation, not the tip. (Lamar Mistake #2)"
    - "Never post without the 3-pillar quality check (one thing, quick win, aha moment)."

# ---- Content Pillars (The One Thing) ----
one_thing: "Making brands that convert — the creative process behind it"
content_pillars:
  - "Brand building (visual identity, voice, positioning)"
  - "Content creation process (ideation → production → distribution)"
  - "Agency operations (client management, scaling creative teams)"
  - "AI + creative tools (how AI amplifies creative output, not replaces it)"

# ---- Target Platforms ----
# NOTE: AI influencers DO NOT post on LinkedIn (99% AI detection, ban risk).
# YouTube low-cadence only (2026 "inauthentic content" policy).
# Visual-first creative content thrives on IG/TikTok — natural fit for AI persona.
platforms:
  primary:
    - instagram                       # Visual-first platform, perfect for creative (AI-labeled)
    - tiktok                          # Short creative process clips (AI-labeled)
  secondary:
    - twitter                         # Design opinions, creative hot takes
    - facebook                        # Cross-post from IG, creative communities (AI-labeled)
  restricted:
    - youtube                         # 1-2 pillar videos/week MAX, high-quality only
  forbidden:
    - linkedin                        # AI personas get detected/banned — protects Anthony's real LinkedIn

# ---- Content Funnel Distribution ----
funnel:
  top_of_funnel: 50                   # Broad creative content, design trends
  middle_of_funnel: 30                # Process deep-dives, tool reviews
  bottom_of_funnel: 20                # "Cocreatiq OS powers our content engine" / product demos

# ---- Platform-Specific Rules ----
# AI influencer — NO LinkedIn (auto-detected), limited YouTube (inauthentic content policy)
platform_rules:
  instagram:
    format: "reels_carousels_stories"
    max_duration_sec: 90
    captions: "always_on"
    carousel_slides: "5-10 per carousel"
    posting_frequency: "3x per day"
    ai_disclosure: "API flag + 'Made with AI' label auto-set"
  tiktok:
    format: "short_form"
    max_duration_sec: 60
    captions: "always_on"
    posting_frequency: "3x per day"
    ai_disclosure: "is_aigc flag required — handled by publisher"
  twitter:
    format: "threads_and_images"
    max_chars: 280
    posting_frequency: "3x per day"
    ai_disclosure: "bio + occasional post mention"
  facebook:
    format: "cross_post_from_ig"
    posting_frequency: "2x per day"
    ai_disclosure: "API flag (same token as IG)"
  youtube:
    # AI channel — conservative to avoid "inauthentic content" demonetization.
    long_form:
      frequency: "1x per week MAX"     # Design process, brand breakdowns — must be insight-rich
      min_duration_min: 5
      max_duration_min: 15
    shorts:
      frequency: "1x per day first 30 days, then 2x per day"
      max_duration_sec: 60
      captions: "always_on"
    ai_disclosure: "containsSyntheticMedia=true on every upload"
    warning: "Mass-produced/templated content triggers demonetization. Quality > quantity."
