    reference_spec:
      length: "2 minutes (120 seconds)"
      format: "MP3 or WAV, highest quality available"
      environment: "Quiet room, mic 6-12 inches from mouth"
      style: "Conversational — NOT reading a script"
      content_mix:
        - "30s — tell a work story"
        - "30s — explain something being built"
        - "30s — hot take on industry"
        - "30s — signature phrases said naturally ('keep it 100', 'big facts', 'let's go', 'Creator Create')"
      rules:
        dos:
          - "Record in one take if possible (continuous audio)"
          - "Include natural pauses, 'uhm's, breaks — AI learns rhythm"
          - "Laugh if something's funny, get intense when fired up"
          - "Say signature phrases naturally, not performed"
        donts:
          - "Don't read scripted copy — sounds robotic when cloned"
          - "Don't over-edit afterward — rawness is the data"
          - "Avoid background music, fan noise, echo"

