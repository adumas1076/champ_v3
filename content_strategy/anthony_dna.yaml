icp:
  # Two distinct audience segments — content speaks to BOTH

  segment_1_business_owners:
    who: "Business owners leveraging AI to scale and systematize their business"
    income_range: "$20K+/month minimum"
    top_frustrations:
      - "Scaling without losing quality (more clients = quality drops or team explodes)"
      - "Managing lead gen (pipelines leak, follow-up is manual, conversion is guessed)"
      - "Overcoming AI tech fatigue (too many tools, too much hype, no signal)"
      - "Scaling = more training + more headcount + more overhead"
      - "Outdated systems that can't keep up with new clients"
      - "More clients = more of THEIR time (growth compounds the problem)"
    failed_attempts:
      - "Hired more people — overhead exploded, now managing humans instead of building"
      - "Bought 15 SaaS tools — stack is a mess, nothing talks to each other"
      - "Hired agencies — expensive, slow, lost control of their voice"
      - "Tried DIY AI — too technical, no time, scattered results"
      - "Consultants with frameworks but no implementation"
      - "Zapier/n8n — got stuck, broke more than it fixed"
    secret_desire:
      - "TIME BACK — work ON the business, not IN it"
      - "Stop being the bottleneck — disappear from ops and still grow"
      - "Stop being a 'boss' — become an actual OWNER"
      - "Quality AT scale, not quality OR scale"

  segment_2_creators_entrepreneurs:
    who: "Entrepreneurs and creatives learning AI tools/skills to navigate the fast-paced AI space"
    income_range: "Early/growing (pre-$20K/mo most likely)"
    top_frustrations:
      - "Overwhelming complexity — too many tools, too many choices, no clear path"
      - "Fear of investing in the wrong direction — what if I pick the wrong tool/stack/skill?"
      - "Staying up to date — the AI space moves too fast to keep up"
      - "Don't want to pay for subscriptions without knowing if they work or are needed"
      - "Want actual plans and blueprints that work — not hype, not tools for tools' sake"
      - "Overwhelmed by options, no structure"
      - "Tired of surface-level content — want real implementation"
    failed_attempts:
      - "Bought $997 courses that were outdated in 3 months"
      - "Watched 100 YouTube tutorials — information overload, zero implementation"
      - "Used ChatGPT a few times — basic stuff only, never cracked real workflows"
      - "Downloaded every AI app — app collector syndrome, no systems"
      - "Followed gurus on X/TikTok — surface-level tips, no depth"
      - "Joined free Discord/Skool communities — noise, no structure"
    secret_desire:
      - "Become THE AUTHORITY in their lane — not just another poster"
      - "Recurring income without trading hours"
      - "Stop feeling BEHIND — everyone else 'gets AI' and they don't"
      - "Actually BUILD something instead of consuming more content"

  # Common thread across both segments:
  shared_identity: "Creators and builders who want AI to work FOR them, not consume them"
  shared_pain: "Stuck between hype and reality — they see the potential but can't bridge the gap"

transformation:
  # Two transformations — one per segment

  segment_1_business_owners:
    one_liner: "I help business owners scale past their plateaus by leveraging AI, to reclaim their time and build businesses that run without them being the bottleneck."
    before_state: "Bottleneck — scaling means more of THEIR time, more hires, more overhead"
    after_state: "Freedom — business runs without them, time is reclaimed"
    method: "Leveraging AI operators + the Marketing Machine + Click to Client pipeline"

  segment_2_creators_entrepreneurs:
    one_liner: "I help creators and entrepreneurs go from AI-overwhelmed consumers to confident Vibe Creators who ship what they think."
    before_state: "AI-overwhelmed consumers — paralyzed by choices, afraid of picking wrong, stuck watching"
    after_state: "Confident Vibe Creators — vibing with AI, shipping what they think, building with no spoon"
    method: "Vibe Creator Community + Vibe Creator skill stack (Vibe Coding/Marketing/Design/Building)"

enemy:
  stands_against:
    name: "The AI Hype Industrial Complex"
    definition: "The culture of TALKING about AI instead of CREATING with it. Gurus selling $997 courses they didn't build. Creators consuming tutorials they never ship. Businesses collecting tools they never systematize. The loudest voices are the least qualified."

  old_way:
    - "Trade time for money — the hired gun model that caps income and steals life"
    - "Scale = more headcount + more overhead — growth that compounds the problem"
    - "Learn AI by watching tutorials — consuming content about AI instead of USING it to create"
    - "Use AI by buying tools — app collecting instead of system building"
    - "Build brand by posting tips — surface noise that gets attention but not authority"
    - "Grind 60 hours/week — badge-of-honor burnout culture"

  industry_lies:
    - "Just use ChatGPT bro — oversimplification that leaves people lost"
    - "AI will replace everything — fear sells courses, reality is nuanced"
    - "You need to be technical — gatekeeping that protects old experts"
    - "Here's the ONE tool you need — app collector syndrome repackaged"
    - "Passive income — nothing passive about a real business"
    - "Done-for-you — usually outsourced humans with markup"
    - "Built this in a weekend — when they didn't build anything"
    - "$997 courses outdated in 3 months"
    - "Screenshots of AI output posted as proof of work"

  rage_points:
    - "Disney/Marvel laying off VFX artists who built the MCU while AI-hype bros take their seat with zero creative chops"
    - "Prompt engineers who've never shipped a product calling themselves experts"
    - "Courses teaching 'how to use AI' by people who clearly don't use it"
    - "The agency model that extracts from creatives and calls it opportunity"
    - "Creators posting tips they've never implemented"
    - "Infinite consumption loop — content about watching content"

manifesto:
  stands_for:
    - "Vibe Creating — creating at the highest level WITH AI, no spoon, no gatekeeping"
    - "Building in public for REAL — real numbers, real failures, real wins"
    - "Creators becoming OWNERS — not hired guns"
    - "Creation > Consumption — the whole philosophy"
    - "Principles > Hacks — de Bono, Meadows, Dalio + Anthony"
  core_philosophy: "Think it → Vibe it → Have it. Creator Create."
  signature_belief: "You don't make money. You create wealth."

