<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Cocreatiq OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* Animations */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0px rgba(34,197,94,0.4); }
      50% { box-shadow: 0 0 12px rgba(34,197,94,0.8); }
    }
    @keyframes orb-pulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.35); opacity: 0; }
    }
    @keyframes orb-pulse2 {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.2); opacity: 0.1; }
    }
    @keyframes bounce-up {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes progress-fill {
      from { width: 0; }
      to { width: 60%; }
    }
    @keyframes gauge-fill {
      from { stroke-dashoffset: 184.73; }
      to { stroke-dashoffset: 60.96; }
    }
    @keyframes slide-up {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .orb-ring1 { animation: orb-pulse 2.5s ease-in-out infinite; }
    .orb-ring2 { animation: orb-pulse2 2.5s ease-in-out infinite 0.3s; }
    .bounce-up { animation: bounce-up 1.5s ease-in-out infinite; }
    .widget { animation: fade-in-up 0.5s ease-out both; }
    .widget:nth-child(2) { animation-delay: 0.1s; }
    .widget:nth-child(3) { animation-delay: 0.2s; }
    .widget:nth-child(4) { animation-delay: 0.3s; }
    .progress-bar { animation: progress-fill 1s ease-out 0.3s both; }
    .gauge-circle { animation: gauge-fill 1s ease-out 0.3s both; }

    .glass {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* Drawer */
    .drawer-backdrop { display: none; }
    .drawer-backdrop.open { display: block; animation: fade-in 0.2s ease both; }
    .drawer-panel { transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); }
    .drawer-panel.open { transform: translateY(0); }

    /* SVG icons inline */
    .icon { display: inline-flex; align-items: center; justify-content: center; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'champ-accent': '#3b82f6',
            'champ-green': '#22c55e',
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="app" class="fixed inset-0 flex flex-col overflow-hidden select-none"
       style="background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.08) 0%, #0a0a0a 60%);">

    <!-- Grid pattern -->
    <div class="absolute inset-0 pointer-events-none" style="opacity:0.015; background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 40px 40px;"></div>

    <!-- Status Bar -->
    <div class="flex items-center justify-between px-6 py-2 text-xs text-white/70 relative z-10">
      <div class="flex items-center gap-1.5 font-semibold text-white/90 tracking-wide">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <span>Cocreatiq</span>
      </div>
      <span id="clock" class="font-medium tabular-nums"></span>
      <div class="flex items-center gap-1.5">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h.01"/><path d="M7 20v-4"/><path d="M12 20v-8"/><path d="M17 20V8"/></svg>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/></svg>
      </div>
    </div>

    <!-- Date & Greeting -->
    <div class="px-6 pt-2 pb-4 relative z-10">
      <p id="date-line" class="text-white/30 text-xs font-medium"></p>
      <h1 id="greeting" class="text-2xl font-bold text-white mt-0.5 tracking-tight"></h1>
    </div>

    <!-- Widgets -->
    <div class="flex-1 overflow-y-auto px-4 pb-4 space-y-3 relative z-10 scrollbar-hide">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">

        <!-- Brain Status -->
        <div class="glass rounded-2xl p-5 widget">
          <div class="flex items-start justify-between mb-3">
            <div class="flex items-center gap-2.5">
              <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:rgba(59,130,246,0.15)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>
              </div>
              <div>
                <p class="text-[11px] text-white/40 uppercase tracking-wider font-medium">Brain Status</p>
                <p class="text-sm font-semibold text-white mt-0.5">Online</p>
              </div>
            </div>
            <div class="w-2.5 h-2.5 rounded-full mt-1 pulse-glow" style="background:#22c55e"></div>
          </div>
          <div class="flex items-center gap-2 text-xs text-white/40">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
            <span>Phase: Inference</span>
            <span class="text-white/20">|</span>
            <span>Uptime: 4h 23m</span>
          </div>
        </div>

        <!-- Active Tasks -->
        <div class="glass rounded-2xl p-5 widget">
          <div class="flex items-start justify-between mb-4">
            <div class="flex items-center gap-2.5">
              <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:rgba(34,197,94,0.15)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              </div>
              <div>
                <p class="text-[11px] text-white/40 uppercase tracking-wider font-medium">Active Tasks</p>
                <p class="text-sm font-semibold text-white mt-0.5">3 of 5 running</p>
              </div>
            </div>
          </div>
          <div class="w-full h-2 rounded-full bg-white/5 overflow-hidden">
            <div class="h-full rounded-full progress-bar" style="background:#22c55e"></div>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">

        <!-- Memory -->
        <div class="glass rounded-2xl p-5 widget">
          <div class="flex items-center gap-4">
            <div class="relative flex-shrink-0">
              <svg width="64" height="64" style="transform:rotate(-90deg)">
                <circle cx="32" cy="32" r="29.5" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="5"/>
                <circle cx="32" cy="32" r="29.5" fill="none" stroke="#a855f7" stroke-width="5"
                  stroke-dasharray="185.35" stroke-dashoffset="185.35" stroke-linecap="round" class="gauge-circle"
                  style="stroke-dashoffset: 61.17;"/>
              </svg>
              <span class="absolute inset-0 flex items-center justify-center text-xs font-bold text-white" style="transform:rotate(0deg)">67%</span>
            </div>
            <div>
              <p class="text-[11px] text-white/40 uppercase tracking-wider font-medium">Memory</p>
              <p class="text-sm font-semibold text-white mt-0.5">Context Usage</p>
              <p class="text-xs text-white/30 mt-1">67k / 100k tokens</p>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="glass rounded-2xl p-5 widget">
          <p class="text-[11px] text-white/40 uppercase tracking-wider font-medium mb-3">Quick Actions</p>
          <div class="grid grid-cols-2 gap-2.5">
            <button class="flex items-center gap-2.5 rounded-xl p-3 bg-white/[0.03] border border-white/[0.06] hover:bg-white/[0.08] transition-colors active:scale-95">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:rgba(59,130,246,0.15)">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </div>
              <span class="text-xs font-medium text-white/80">Voice Call</span>
            </button>
            <button class="flex items-center gap-2.5 rounded-xl p-3 bg-white/[0.03] border border-white/[0.06] hover:bg-white/[0.08] transition-colors active:scale-95">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:rgba(245,158,11,0.15)">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
              </div>
              <span class="text-xs font-medium text-white/80">Self Mode</span>
            </button>
            <button class="flex items-center gap-2.5 rounded-xl p-3 bg-white/[0.03] border border-white/[0.06] hover:bg-white/[0.08] transition-colors active:scale-95">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:rgba(168,85,247,0.15)">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <span class="text-xs font-medium text-white/80">Avatar Lab</span>
            </button>
            <button class="flex items-center gap-2.5 rounded-xl p-3 bg-white/[0.03] border border-white/[0.06] hover:bg-white/[0.08] transition-colors active:scale-95">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:rgba(107,114,128,0.15)">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              </div>
              <span class="text-xs font-medium text-white/80">Settings</span>
            </button>
          </div>
        </div>
      </div>

      <div class="h-36"></div>
    </div>

    <!-- Bottom Area -->
    <div class="absolute bottom-0 inset-x-0 z-20">
      <div class="h-20 bg-gradient-to-t from-[#0a0a0a] to-transparent pointer-events-none"></div>
      <div class="bg-[#0a0a0a] pb-4 pt-1 space-y-4">
        <!-- Dock -->
        <div class="flex items-center justify-center gap-6">
          <button class="flex flex-col items-center gap-1 active:scale-90 transition-transform">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center" style="background:rgba(59,130,246,0.125)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </div>
            <span class="text-[10px] text-white/40">Call</span>
          </button>
          <button class="flex flex-col items-center gap-1 active:scale-90 transition-transform">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center" style="background:rgba(34,197,94,0.125)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            </div>
            <span class="text-[10px] text-white/40">Dashboard</span>
          </button>
          <button class="flex flex-col items-center gap-1 active:scale-90 transition-transform">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center" style="background:rgba(107,114,128,0.125)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </div>
            <span class="text-[10px] text-white/40">Settings</span>
          </button>
          <button class="flex flex-col items-center gap-1 active:scale-90 transition-transform">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center" style="background:rgba(236,72,153,0.125)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
            </div>
            <span class="text-[10px] text-white/40">Memory</span>
          </button>
        </div>

        <!-- Voice Orb + Drawer toggles -->
        <div class="flex items-center justify-center gap-6">
          <button onclick="openDrawer()" class="flex flex-col items-center gap-0.5">
            <div class="bounce-up">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
            </div>
            <span class="text-[10px] text-white/25">Apps</span>
          </button>

          <!-- Voice Orb -->
          <button class="relative w-16 h-16 rounded-full flex items-center justify-center z-20" onclick="alert('Voice Call activated!')">
            <div class="absolute inset-0 rounded-full orb-ring1" style="background:rgba(59,130,246,0.3)"></div>
            <div class="absolute inset-0 rounded-full orb-ring2" style="background:rgba(59,130,246,0.2)"></div>
            <div class="w-full h-full rounded-full flex items-center justify-center" style="background:linear-gradient(135deg,#3b82f6,#2563eb); box-shadow:0 0 30px rgba(59,130,246,0.5)">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </div>
          </button>

          <button onclick="openDrawer()" class="flex flex-col items-center gap-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
            <span class="text-[10px] text-white/25">Drawer</span>
          </button>
        </div>
      </div>
    </div>

    <!-- App Drawer Backdrop -->
    <div id="drawer-backdrop" class="drawer-backdrop fixed inset-0 bg-black/60 z-40" style="backdrop-filter:blur(4px)" onclick="closeDrawer()"></div>

    <!-- App Drawer Panel -->
    <div id="drawer-panel" class="drawer-panel fixed inset-x-0 bottom-0 z-50 max-h-[85vh] overflow-hidden rounded-t-3xl">
      <div style="background:rgba(255,255,255,0.06); backdrop-filter:blur(40px); border-top:1px solid rgba(255,255,255,0.1)" class="h-full flex flex-col">
        <div class="flex items-center justify-center pt-3 pb-1">
          <div class="w-10 h-1 rounded-full bg-white/20"></div>
        </div>
        <div class="flex items-center justify-between px-6 pb-2">
          <h2 class="text-lg font-semibold text-white">Apps</h2>
          <button onclick="closeDrawer()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="px-6 pb-4">
          <div class="flex items-center gap-2.5 rounded-xl px-3.5 py-2.5" style="background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search apps..." class="bg-transparent text-sm text-white placeholder-white/30 outline-none w-full" />
          </div>
        </div>
        <div class="px-6 pb-10 overflow-y-auto">
          <div class="grid grid-cols-4 gap-5" id="app-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      document.getElementById('date-line').textContent = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
      const h = now.getHours();
      document.getElementById('greeting').textContent = 'Good ' + (h < 12 ? 'Morning' : h < 18 ? 'Afternoon' : 'Evening');
    }
    updateClock();
    setInterval(updateClock, 1000);

    // App grid
    const apps = [
      { name: 'Voice Call', color: '#3b82f6', icon: 'phone' },
      { name: 'Dashboard', color: '#22c55e', icon: 'activity' },
      { name: 'Avatar Lab', color: '#a855f7', icon: 'user' },
      { name: 'Self Mode', color: '#f59e0b', icon: 'cpu' },
      { name: 'Browser', color: '#06b6d4', icon: 'globe' },
      { name: 'Settings', color: '#6b7280', icon: 'settings' },
      { name: 'Memory', color: '#ec4899', icon: 'database' },
      { name: 'Logs', color: '#10b981', icon: 'terminal' },
    ];

    const iconSvgs = {
      phone: '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>',
      activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
      user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
      cpu: '<rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/>',
      globe: '<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
      settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9"/>',
      database: '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>',
      terminal: '<polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>',
    };

    const grid = document.getElementById('app-grid');
    apps.forEach(app => {
      const btn = document.createElement('button');
      btn.className = 'flex flex-col items-center gap-2 active:scale-90 transition-transform';
      btn.innerHTML = `
        <div class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg" style="background:linear-gradient(135deg,${app.color}30,${app.color}15); border:1px solid ${app.color}25">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${app.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${iconSvgs[app.icon]}</svg>
        </div>
        <span class="text-[11px] text-white/50 font-medium truncate w-full text-center">${app.name}</span>
      `;
      grid.appendChild(btn);
    });

    // Drawer
    function openDrawer() {
      document.getElementById('drawer-backdrop').classList.add('open');
      document.getElementById('drawer-panel').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer-backdrop').classList.remove('open');
      document.getElementById('drawer-panel').classList.remove('open');
    }
  </script>
</body>
</html>
